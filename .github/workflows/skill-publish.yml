name: skill-publish

on:
  pull_request:
    paths:
      - 'SKILL.md'
      - '.github/workflows/skill-publish.yml'
      - '.github/scripts/validate-skill.mjs'
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - '.github/workflows/skill-publish.yml'
      - '.github/scripts/validate-skill.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate SKILL.md
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint SKILL.md (frontmatter spec, body length, structure)
        run: node .github/scripts/validate-skill.mjs SKILL.md

      - name: Probe skills CLI against the working tree
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/skill-probe
          cd /tmp/skill-probe
          npx --yes skills@latest add "$WORKSPACE" --list 2>&1 | tee probe.log
          tr -d '\033' < probe.log | grep -Fq 'bentolabs' || {
            echo "::error::skills CLI did not detect the 'bentolabs' skill at the repo root"
            exit 1
          }

  smoke-test-github-install:
    name: Smoke-test the GitHub install form
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install via npx skills add BentoLabs-ai/skills
        run: |
          set -euo pipefail
          mkdir -p /tmp/skill-public-probe
          cd /tmp/skill-public-probe
          npx --yes skills@latest add BentoLabs-ai/skills --list 2>&1 | tee probe.log
          tr -d '\033' < probe.log | grep -Fq 'bentolabs' || {
            echo "::error::Public 'npx skills add BentoLabs-ai/skills' did not list bentolabs"
            exit 1
          }

      - name: Job summary
        run: |
          {
            echo "### Skill published"
            echo ""
            echo "- Source: SKILL.md (repo root)"
            echo "- Install: \`npx skills add BentoLabs-ai/skills\`"
          } >> "$GITHUB_STEP_SUMMARY"
